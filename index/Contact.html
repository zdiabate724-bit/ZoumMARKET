<style>
body{

}
a{

    color:black;
    margin:0 10px;
}

.container{
    width:90%;
    max-width:600px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);

h1{

}

input, textarea{

<body>

<div class="container">
    <h1>Contactez Zoum Market</h1>
    
    <a href="./Acceuil.html">Retour à l'Accueil</a>
