<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Maillots - Zoum Market</title>


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:black;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    color:white;
    font-size:40px;
}
a{
    text-decoration:none;
    color:whitesmoke;
    margin:0 10px;
}

header p{
    color:gold;
}

.galerie{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

.maillot{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.maillot:hover{
    transform:scale(1.05);
}

.maillot img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.info{
    padding:15px;
    text-align:center;
}

.info h3{
    margin-bottom:10px;
}

.prix{
    color:green;
    font-size:22px;
    font-weight:bold;
}

.btn{
    display:inline-block;
    margin-top:10px;
    background:black;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
}

.btn:hover{
    background:gold;
    color:black;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>
<body>

<header>
    <h1>ZOUM MARKET</h1>
    <p>Nos Maillots Disponibles</p>
    <a href="./Pays.html">Pays</a>
    <a href="./Clubs.html">Clubs</a>
</header>
<img src="./Image d'acceuil.webp" alt="">

<footer>
    <h3>Zoum Market</h3>
    <p>Abidjan - Côte d'Ivoire</p>
</footer>

</body>
</html>
